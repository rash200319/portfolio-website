<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./landing.css" />
  </head>
  <body>
    <main class="landing-root">
      <div id="scene-wrap" class="scene-wrap" aria-hidden="true"></div>

      <section class="overlay" aria-label="Portfolio intro">
        <div class="overlay__content">
          <p class="overlay__label">Portfolio Intro</p>
          <h1 class="overlay__title" id="hero-title">Rashmi Paboda</h1>
          <p class="overlay__subtitle" id="hero-subtitle">
            CS Student | Psychology & Neuroscience Enthusiast
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./landing.js"></script>
  </body>
</html>
